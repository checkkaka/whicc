# whicc release workflow
#
# Triggered by pushing a tag matching `v*` (e.g. `v0.1.0`, `v1.2.3`).
# Builds whicc.app, packages it into a .dmg via bin/build_dmg.sh, and
# uploads to GitHub Releases with bilingual notes (zh first, en in
# <details>).
#
# Usage:
#   git tag v0.1.1
#   git push origin v0.1.1
#   # wait ~5 min for the workflow to finish
#   # GitHub Release v0.1.1 is created automatically with whicc-v0.1.1.dmg attached
#
# To avoid signing complexity (Developer ID + Apple notarization), this
# builds ad-hoc signed only. Users will need to right-click → Open the
# first time on macOS Gatekeeper. For wider distribution, add
# `codesign --deep --options=runtime --sign "Developer ID Application: ..."`
# and `xcrun notarytool submit ...` steps.
#
# This workflow REUSES the ci.yml build steps by calling the same
# commands inline. We could extract to a composite action, but at the
# cost of clarity for two workflows — keeping them separate is fine.

name: release

on:
  push:
    tags:
      - 'v*'   # v0.1.0, v1.2.3, etc.

# Don't cancel mid-release; user is waiting for the artifact.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build + upload .app to GitHub Release
    runs-on: macos-15

    timeout-minutes: 45

    permissions:
      contents: write   # needed for softprops/action-gh-release to create the release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Install Xcode 26: compile against the macOS 26 SDK so the
      # `if #available(macOS 26.0, *)` Liquid Glass branch
      # (GlassEffectContainer) compiles, while
      # MACOSX_DEPLOYMENT_TARGET=15.0 keeps the app runnable on
      # macOS 15. macos-15 image ships Xcode 16.4 (macOS 15.5 SDK,
      # lacks the symbol) by default → compile errors without this. ----
      - name: Setup Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Select Xcode 26 as default
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Show tag + Xcode version
        run: |
          echo "Building ${{ github.ref_name }}"
          git describe --tags --always
          xcodebuild -version

      # ---- Diagnostic snapshot (capture regardless of build outcome) ----
      # Captures GitHub runner's environment so failure analysis
      # doesn't depend on accessing CI logs (which require admin auth).
      # Note: This step uploads to env-snapshot artifact on EVERY run
      # (success and failure). That's 1KB / run of storage — 30KB / month
      # if you ship one release a month, well within free quota.
      - name: Capture + upload env snapshot
        if: always()
        run: |
          {
            echo "=== uname ==="
            uname -a
            echo "=== xcode-select ==="
            xcode-select -p
            echo "=== xcodebuild -version ==="
            xcodebuild -version
            echo "=== sh ==="
            ls -la /bin/sh
            echo "=== which python3.13 ==="
            which python3.13 || echo "(not on PATH)"
            echo "=== disk ==="
            df -h / /tmp
            echo "=== memory ==="
            vm_stat | head -5
            echo "=== ulimit ==="
            ulimit -a
            echo "=== /tmp contents ==="
            ls -la /tmp/ | head -20
            echo "=== venv-standalone structure (post-symlink) ==="
            ls -la venv-standalone/ 2>&1 | head -5
            ls venv-standalone/bin/ 2>&1 | head
            echo "=== xcodebuild.log size BEFORE build ==="
            ls -la /tmp/xcodebuild.log 2>&1 || echo "(no log yet)"
          } > /tmp/env_snapshot.txt 2>&1
          echo "---env_snapshot.txt first 30 lines---"
          head -30 /tmp/env_snapshot.txt
      - name: Upload env snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: env-snapshot
          path: /tmp/env_snapshot.txt
          retention-days: 3
          if-no-files-found: ignore

      # ---- Python deps (used by xcodegen preBuildScripts that embed backend) ----
      # Same setup as ci.yml — fresh VM each run, recreate venv-standalone.
      #
      # IMPORTANT: 必须用 python-build-standalone(自包含解释器),不能用
      # `python3 -m venv`。任何基于本机 Python 的 venv(homebrew 或
      # python.org framework)都会让内嵌 python3 dyld 链接用户机上不存在
      # 的绝对路径 → 后端全灭无字幕。详见 ci.yml 注释与 DEVELOPMENT.md
      # "一次性 setup"。SOP.md §Troubleshooting 同步记录了这条踩坑。
      - name: Setup standalone Python 3.13 (self-contained)
        run: |
          curl -sL -o /tmp/cpython-standalone.tar.gz \
            "https://github.com/astral-sh/python-build-standalone/releases/download/20260610/cpython-3.13.14+20260610-aarch64-apple-darwin-install_only_stripped.tar.gz"
          mkdir -p /tmp/python-standalone
          tar -xzf /tmp/cpython-standalone.tar.gz -C /tmp/python-standalone
          mkdir -p venv-standalone
          cp -R /tmp/python-standalone/python/* venv-standalone/
          ./venv-standalone/bin/python3.13 -m ensurepip
          ./venv-standalone/bin/pip install --no-cache-dir -r requirements.txt

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml --project .

      # ---- Main build (Release) ----
      # This is the same command as DEVELOPMENT.md "快速打包". Build artifact
      # ends up at build/Build/Products/Release/whicc.app.
      #
      # Tee output to a log file so we can capture failure diagnostics
      # in a workflow artifact (default xcodebuild output is buffered and
      # hidden if the step exits non-zero). The last 200 lines of xcodebuild
      # output are uploaded even on failure — without this, debug info
      # for a failed release is lost (CI logs are admin-restricted).
      - name: Build whicc (Release)
        run: |
          set -o pipefail
          xcodebuild \
            -project whicc.xcodeproj \
            -scheme whicc \
            -configuration Release \
            -derivedDataPath build \
            clean build 2>&1 | tee /tmp/xcodebuild.log
          echo "=== last 200 lines of xcodebuild output ==="
          tail -200 /tmp/xcodebuild.log || true
          echo "=== end ==="
      - name: Upload xcodebuild log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: /tmp/xcodebuild.log
          retention-days: 3
          if-no-files-found: ignore

      # ---- Sanity check: app bundle exists ----
      - name: Verify .app bundle
        run: |
          ls -la build/Build/Products/Release/whicc.app
          # Confirm executable is there
          test -x build/Build/Products/Release/whicc.app/Contents/MacOS/whicc \
            && echo "✓ executable present" \
            || (echo "✗ executable missing"; exit 1)
          # Confirm .lproj is bundled (CI lint passed earlier, but be paranoid)
          ls build/Build/Products/Release/whicc.app/Contents/Resources/en.lproj/Localizable.strings

      # ---- Self-containment + macOS 15 compat guard (same as ci.yml) ----
      # A release that fails these is exactly the "打不开/没字幕" bug
      # family we shipped before — hard-fail rather than publish.
      - name: Verify embedded Python is self-contained + macOS 15 compatible
        run: |
          set -euo pipefail
          APP=build/Build/Products/Release/whicc.app
          PY="$APP/Contents/Resources/venv/bin/python3"
          test -f "$PY" || { echo "✗ embedded python3 missing"; exit 1; }
          if otool -L "$PY" | grep -E "/Library/Frameworks/Python|/opt/homebrew"; then
            echo "✗ embedded python3 links a machine-specific framework (not self-contained)"
            exit 1
          fi
          echo "✓ embedded python3 is self-contained"
          BAD=0
          for lib in $(find "$APP/Contents/Resources/venv/lib" \
                        \( -name "*.so" -o -name "*.dylib" \) -path "*mlx*"); do
            MINOS=$(otool -l "$lib" 2>/dev/null \
                    | awk '/LC_BUILD_VERSION/{f=1} f && /minos/{print $2; exit}')
            case "$MINOS" in
              16.*|2[0-9].*) echo "✗ $lib minos=$MINOS (needs > macOS 15)"; BAD=1 ;;
            esac
          done
          if [ "$BAD" != 0 ]; then exit 1; fi
          echo "✓ mlx native libraries load on macOS 15"
          # App binary itself must target 15.0
          MAIN_MINOS=$(otool -l "$APP/Contents/MacOS/whicc" \
                    | awk '/LC_BUILD_VERSION/{f=1} f && /minos/{print $2; exit}')
          echo "app binary minos=$MAIN_MINOS"
          [ "$MAIN_MINOS" = "15.0" ] || { echo "✗ expected minos 15.0"; exit 1; }

      # ---- Build .dmg for distribution ----
      # bin/build_dmg.sh wraps the hdiutil dance: create UDRW → mount →
      # ditto .app in → detach → convert to UDZO. Plain dmg layout
      # (no custom Finder window) keeps the script simple; users get
      # the standard mount → drag-to-Applications flow.
      # -size 700m: whicc.app is ~566 MB (Python venv with mlx/numpy/scipy).
      # Tag name is the version, e.g. v0.1.1 → "0.1.1".
      - name: Build .dmg
        run: |
          chmod +x bin/build_dmg.sh
          VERSION="${GITHUB_REF_NAME#v}"
          bin/build_dmg.sh "$VERSION" \
            "build/Build/Products/Release/whicc.app" \
            "build/Build/Products/Release/whicc-${GITHUB_REF_NAME}.dmg"
          ls -la "build/Build/Products/Release/whicc-${GITHUB_REF_NAME}.dmg"

      # ---- Compute size + SHA256 of the .dmg (for release notes) ----
      # The .dmg is what users download; the .app directory is internal.
      - name: Compute .dmg size + SHA256
        id: metadata
        run: |
          cd build/Build/Products/Release
          DMG="whicc-${GITHUB_REF_NAME}.dmg"
          SIZE=$(du -sh "$DMG" | cut -f1)
          BYTES=$(du -sb "$DMG" | cut -f1)
          SHA=$(shasum -a 256 "$DMG" | cut -d' ' -f1)
          echo "size=$SIZE"
          echo "bytes=$BYTES"
          echo "sha=$SHA"
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"
          echo "bytes=$BYTES" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      # ---- Generate SHA256SUMS for the release ----
      - name: Generate SHA256SUMS file
        run: |
          cd build/Build/Products/Release
          shasum -a 256 whicc-${GITHUB_REF_NAME}.dmg > SHA256SUMS
          cat SHA256SUMS

      # ---- Create GitHub Release + upload assets ----
      # softprops/action-gh-release handles both release creation and asset
      # upload in one step. It uses GitHub's auto-generated release notes
      # (which derive from merged PRs since the last tag) and lets us add
      # extra notes via `body:`.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          # Use the tag name as the release title; users will see "v0.1.0"
          name: ${{ github.ref_name }}
          generate_release_notes: true   # auto-generate from merged PRs
          body: |
            ## 🌟 v0.2.0 — macOS 15 支持 + 性能与稳定性改进

            **大小**: ${{ steps.metadata.outputs.size }}
            **SHA256**: `${{ steps.metadata.outputs.sha }}`

            下载 `whicc-${{ github.ref_name }}.dmg`，双击挂载，把
            `whicc.app` 拖到 `/Applications/`。首次启动：右键 → 打开
            （Gatekeeper 对 ad-hoc 签名应用的要求）。

            ### 🎉 致谢

            本次发布的全部代码改进来自 [@lyy0709](https://github.com/lyy0709)
            贡献的 [PR #1](https://github.com/nbzz/whicc/pull/1) ——
            12 个 commit，+1714 / -770 行。从 macOS 15 兼容到 ASR
            模型切换的全链路打通，从下载进度的可视化到翻译服务节点
            连接的稳定性 —— 没有这次贡献，whicc 还卡在 "UI 切模型
            不生效"、"下载一直 0%"、以及 "macOS 15 上根本启动不了"
            几个老大难问题上。

            谢谢 [@lyy0709](https://github.com/lyy0709) 🫶

            ### ✨ 主要改进

            #### 🛡️ macOS 15 兼容（部署目标 26.0 → 15.0）
            - `Info.plist` / `Package.swift` / `project.yml` 三处部署目标降到 15.0
            - Liquid Glass（`GlassEffectContainer`）加
              `if #available(macOS 26.0, *)` 兜底，macOS 15 上自动退化为
              `ultraThinMaterial` 磨砂材质
            - CI venv 改用 python-build-standalone，自包含解释器，
              用户机无需装 Python
            - 增加 build 后回归校验（mlx dylib minos、内嵌 python dyld 路径）

            #### ⚡ 性能
            - 音频采集去磁盘化（直读内存 queue，少 0.15-1.15s 摄取延迟）
            - ASR 探针结果复用（每句字幕少一次完整推理）
            - BackendLauncher 异步化，启动期间 UI 全程可响应
            - 下载进度 "+1% 或 ≥3s" 双条件，慢速网络不再假死

            #### 🐛 Bug 修复
            - ASR 模型切换：UI 写槽位键、后端读旧字段，全链路接通 +
              槽位不被覆盖
            - 模型下载：取消真中断 + 断点续传 + 取消期间再点击的请求重放
            - 翻译设置页：输入框防回流（"地址打一半被吃字"根治）+
              `/v1` 兼容 + 5s 探活超时
            - 后端进程监控：crash 自动重启 + 等配置/等模型友好提示
            - 设置窗键盘焦点（`makeKeyAndOrderFront` 顺序修复）
            - OpenAI Responses 端点 + API key 鉴权支持

            <details>
            <summary>English</summary>

            ## 🌟 v0.2.0 — macOS 15 support + perf + stability

            **Size**: ${{ steps.metadata.outputs.size }}
            **SHA256**: `${{ steps.metadata.outputs.sha }}`

            Download `whicc-${{ github.ref_name }}.dmg`, double-click to
            mount, drag `whicc.app` to `/Applications/`. First launch:
            right-click → Open (Gatekeeper requires this for ad-hoc
            signed builds).

            ### 🎉 Credits

            All code in this release was contributed by
            [@lyy0709](https://github.com/lyy0709) in
            [PR #1](https://github.com/nbzz/whicc/pull/1) — 12 commits,
            +1714 / -770 lines. macOS 15 compat, end-to-end ASR model
            switching, visible download progress, and stable
            translation-service connection. Without this contribution,
            whicc would still be stuck on "UI model switch has no effect",
            "download progress frozen at 0%", and "doesn't even launch
            on macOS 15".

            Thank you [@lyy0709](https://github.com/lyy0709) 🫶

            ### ✨ Highlights

            #### 🛡️ macOS 15 compatibility (deployment target 26.0 → 15.0)
            - `Info.plist` / `Package.swift` / `project.yml` deployment
              targets lowered
            - Liquid Glass (`GlassEffectContainer`) wrapped in
              `if #available(macOS 26.0, *)`; macOS 15 falls back to
              `ultraThinMaterial`
            - CI venv switched to python-build-standalone (self-contained
              interpreter, no Python install on user machine)
            - Build-time regression guards (mlx dylib minos, embedded
              python dyld)

            #### ⚡ Performance
            - Zero-disk audio pipeline (in-memory queue, 0.15-1.15s less
              ingest latency)
            - ASR probe result reuse (one fewer full inference per caption)
            - Async BackendLauncher (UI responsive during boot)
            - Download progress "+1% or ≥3s" dual threshold (no more
              fake-stall)

            #### 🐛 Bug fixes
            - ASR model switching: slot key + backend read both wired
              through
            - Model download: real cancel + resume + replay queued
              re-clicks
            - Settings page: input rollback fix + `/v1` compat + 5s probe
              timeout
            - Backend process monitor: auto-restart on crash, friendly
              notice for waiting-config / waiting-model exits
            - Settings window keyboard focus (activation order fix)
            - OpenAI Responses endpoint + API key auth

            </details>
          files: |
            build/Build/Products/Release/whicc-${{ github.ref_name }}.dmg
            build/Build/Products/Release/SHA256SUMS
          fail_on_unmatched_files: true